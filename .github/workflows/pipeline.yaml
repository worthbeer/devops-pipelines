name: CI PipeLine

on:
  push:
    branches:[ main ]

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/chheckout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
          node-version: 16

    - name: Install dependancies
      run: npm install

    - name: Run tests
      run: npm test